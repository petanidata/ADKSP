<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <style>
    .title { font: 18px sans-serif; fill: #222 }
    .label { font: 14px sans-serif; fill: #222 }
    .small { font: 12px sans-serif; fill: #333 }
    .box { fill: #f7f7f7; stroke: #333; stroke-width: 1 }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead) }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Left: Bar chart -->
  <text x="50" y="30" class="title">Contoh Distribusi Kelas (Imbalanced)</text>
  <!-- Bars -->
  <!-- Iris-setosa -->
  <rect x="60" y="80" width="120" height="260" fill="#4c72b0" />
  <text x="120" y="360" class="label" text-anchor="middle">Iris-setosa</text>
  <text x="120" y="70" class="small" text-anchor="middle">2000</text>
  <!-- Iris-versicolor -->
  <rect x="220" y="260" width="120" height="80" fill="#55a868" />
  <text x="280" y="360" class="label" text-anchor="middle">Iris-versicolor</text>
  <text x="280" y="250" class="small" text-anchor="middle">100</text>
  <!-- Iris-virginica -->
  <rect x="380" y="310" width="120" height="30" fill="#c44e52" />
  <text x="440" y="360" class="label" text-anchor="middle">Iris-virginica</text>
  <text x="440" y="300" class="small" text-anchor="middle">25</text>

  <!-- Right: Flowchart -->
  <text x="620" y="30" class="title">Alur Penanganan Data Imbalance</text>

  <!-- Boxes -->
  <rect x="580" y="70" width="160" height="60" rx="8" class="box" />
  <text x="660" y="105" class="label" text-anchor="middle">Load Data</text>

  <rect x="580" y="150" width="220" height="60" rx="8" class="box" />
  <text x="690" y="185" class="label" text-anchor="middle">Train/Test Split\n(Stratified)</text>

  <rect x="820" y="70" width="220" height="60" rx="8" class="box" />
  <text x="930" y="105" class="label" text-anchor="middle">Resampling\n(Under/Over/SMOTE)</text>

  <rect x="820" y="150" width="220" height="60" rx="8" class="box" />
  <text x="930" y="185" class="label" text-anchor="middle">Model + Class Weighting\n/Ensemble</text>

  <rect x="1040" y="105" width="160" height="60" rx="8" class="box" />
  <text x="1120" y="140" class="label" text-anchor="middle">Evaluate\n(PR AUC / Confusion)</text>

  <!-- Arrows -->
  <path d="M740 100 L820 100" class="arrow" />
  <path d="M740 180 L820 180" class="arrow" />
  <path d="M1040 135 L1040 135" class="arrow" />
  <path d="M1040 135 L1040 135" stroke="none" />
  <path d="M1040 135 L1040 135" stroke="none" />
  <path d="M1040 135 L1040 135" stroke="none" />
  <path d="M1040 135 L1040 135" stroke="none" />
  <path d="M1040 135 L1040 135" stroke="none" />
  <path d="M1040 135 L1040 135" stroke="none" />
  <path d="M1040 135 L1040 135" stroke="none" />
  <!-- arrow from resampling/model to evaluate -->
  <path d="M1040 100 L1040 140" class="arrow" />

</svg>
